<!DOCTYPE html>
<html>
<head>
    <title>Task Scheduler</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #414b61;
            color: #f1f5f9;
            margin: 0;
            padding: 20px;
            background-image: url("template/group-20.jpg"); /* fixed name */
            background-size: cover;
        }

        h2 {
            text-align: center;
            color: #38bdf8;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        h3 {
            color: #22c55e;
        }

        input, select {
            width: 95%;
            padding: 8px;
            margin: 5px 0 10px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 10px;
            color: black;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #0ea5e9;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #334155;
            margin: 5px 0;
            padding: 8px;
            border-radius: 5px;
        }

        .execute {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #ef4444;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .execute:hover {
            background: #dc2626;
        }
    </style>

</head>
<body>

<div class="container">

<h2>Task Scheduler</h2>

<!-- Add Task -->
<h3>Add Task</h3>
<form action="/add" method="post">
    <input type="text" name="task" placeholder="Enter task" required>
    <input type="number" name="priority" min="1" placeholder="Priority" required>
    <button type="submit">Add Task</button>
</form>

<!-- Change Priority -->
<h3>Change Priority</h3>
<form action="/change" method="post">
    
    Task:
    <select name="task">
        {% for t in tasks %}
            <option value="{{ t[0] }}">
                {{ t[0] }} (Priority {{ t[1] }})
            </option>
        {% endfor %}
    </select>

    New Priority:
    <input type="number" name="priority" min="1" placeholder="New priority" required>

    <button type="submit">Update Priority</button>
</form>

<!-- Next Task -->
<h3>Next Task</h3>
<p>
    {% if next_task %}
        <b>{{ next_task[0] }}</b> (Priority {{ next_task[1] }})
    {% else %}
        No task available
    {% endif %}
</p>

<!-- All Tasks -->
<h3>All Tasks</h3>
<ul>
    {% for t in tasks %}
        <li>{{ t[0] }} (Priority {{ t[1] }})</li>
    {% endfor %}
</ul>

<!-- Execute -->
<a href="/execute" class="execute">Execute Top Task</a>

</div>

</body>
</html>
